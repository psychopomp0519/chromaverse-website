<svg xmlns="http://www.w3.org/2000/svg" width="60" height="60" viewBox="0 0 60 60" role="img" aria-label="Seamless faint dark crystal facet pattern tile">
  <rect width="60" height="60" fill="#0B0B14"/>

  <!-- Base crystal / prism lattice -->
  <g fill="none"
     stroke="rgba(96,165,250,0.04)"
     stroke-width="0.5"
     shape-rendering="geometricPrecision"
     vector-effect="non-scaling-stroke">

    <!-- Hexagon / facet grid -->
    <path d="M -30 10 L -25 0 L -15 0 L -10 10 L -15 20 L -25 20 Z"/>
    <path d="M -10 10 L -5 0 L 5 0 L 10 10 L 5 20 L -5 20 Z"/>
    <path d="M 10 10 L 15 0 L 25 0 L 30 10 L 25 20 L 15 20 Z"/>
    <path d="M 30 10 L 35 0 L 45 0 L 50 10 L 45 20 L 35 20 Z"/>
    <path d="M 50 10 L 55 0 L 65 0 L 70 10 L 65 20 L 55 20 Z"/>

    <path d="M -20 30 L -15 20 L -5 20 L 0 30 L -5 40 L -15 40 Z"/>
    <path d="M 0 30 L 5 20 L 15 20 L 20 30 L 15 40 L 5 40 Z"/>
    <path d="M 20 30 L 25 20 L 35 20 L 40 30 L 35 40 L 25 40 Z"/>
    <path d="M 40 30 L 45 20 L 55 20 L 60 30 L 55 40 L 45 40 Z"/>
    <path d="M 60 30 L 65 20 L 75 20 L 80 30 L 75 40 L 65 40 Z"/>

    <path d="M -30 50 L -25 40 L -15 40 L -10 50 L -15 60 L -25 60 Z"/>
    <path d="M -10 50 L -5 40 L 5 40 L 10 50 L 5 60 L -5 60 Z"/>
    <path d="M 10 50 L 15 40 L 25 40 L 30 50 L 25 60 L 15 60 Z"/>
    <path d="M 30 50 L 35 40 L 45 40 L 50 50 L 45 60 L 35 60 Z"/>
    <path d="M 50 50 L 55 40 L 65 40 L 70 50 L 65 60 L 55 60 Z"/>

    <!-- Internal prism facets: triangles / diamonds -->
    <path d="M -10 10 L 0 30 L 10 10"/>
    <path d="M 10 10 L 20 30 L 30 10"/>
    <path d="M 30 10 L 40 30 L 50 10"/>
    <path d="M 50 10 L 60 30 L 70 10"/>

    <path d="M -20 30 L -10 50 L 0 30"/>
    <path d="M 0 30 L 10 50 L 20 30"/>
    <path d="M 20 30 L 30 50 L 40 30"/>
    <path d="M 40 30 L 50 50 L 60 30"/>

    <!-- Subtle diamond connections -->
    <path d="M 5 0 L 15 20 L 5 40 L 15 60"/>
    <path d="M 25 0 L 35 20 L 25 40 L 35 60"/>
    <path d="M 45 0 L 55 20 L 45 40 L 55 60"/>

    <path d="M -5 20 L 5 40 L -5 60"/>
    <path d="M 15 20 L 25 40 L 15 60"/>
    <path d="M 35 20 L 45 40 L 35 60"/>
    <path d="M 55 20 L 65 40 L 55 60"/>
  </g>

  <!-- Occasional slightly brighter highlights -->
  <g fill="none"
     stroke="rgba(96,165,250,0.06)"
     stroke-width="0.5"
     shape-rendering="geometricPrecision"
     vector-effect="non-scaling-stroke">

    <path d="M 15 0 L 25 0 L 30 10"/>
    <path d="M 25 20 L 35 20 L 40 30"/>
    <path d="M 35 40 L 45 40 L 50 50"/>

    <path d="M 5 20 L 15 20 L 20 30"/>
    <path d="M 15 40 L 25 40 L 30 50"/>

    <path d="M 20 30 L 30 50 L 40 30"/>
    <path d="M 0 30 L 10 50 L 20 30"/>
  </g>
</svg>